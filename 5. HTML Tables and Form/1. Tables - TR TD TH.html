<!-- tr th td 
 tr : table row
 th : table header
 td : table description (content) -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>high-income threshold</title>
  </head>
  <body>
    <h1>high-income threshold</h1>
    <table>
      <tr>
        <th>Year</th>

        <td>1987</td>
        <td>6,000</td>
        <td>October 2, 1988</td>
      </tr>
      <tr>
        <td>1988</td>
        <td>6,000</td>

      </tr>
      <tr>
        <td>2000</td>
        <td>9,265</td>
        <td>July 1, 2001</td>
      </tr>
    </table>
  </body>
</html>
