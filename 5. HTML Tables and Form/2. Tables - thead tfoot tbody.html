<!-- thead tbody tfoot 
thead: segmentize the table header part
tbody: segmentize the table body part
tfoot: segmentize the table footer part 
-->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>high-income threshold</title>
  </head>
  <body>
    <h1>high-income threshold</h1>
    <table>
      <!-- thead element -->
      <thead>
        <tr>
          <th>Year</th>
          <th>GNI per capita (US$)</th>
          <th>Date of classification</th>
        </tr>
      </thead>
      <!-- tbody element -->
      <tbody>
        <tr>
          <td>1987</td>
          <td>6,000</td>
          <td>October 2, 1988</td>
        </tr>
        <tr>
          <td>1988</td>
          <td>6,000</td>
          <td>September 13, 1989</td>
        </tr>
        <tr>
          <td>2000</td>
          <td>9,265</td>
          <td>July 1, 2001</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
